<body>

  <h1>🎰 Slot Machine Deluxe</h1>

  <div id="coins">Coins: 100</div>

  <div class="slot-container">
    <div class="slot" id="slot1">-</div>
    <div class="slot" id="slot2">-</div>
    <div class="slot" id="slot3">-</div>
  </div>

<button onclick="spin()">Spin (Cost: 10)</button>

  <div id="result"></div>

  <script>
    let coins = 100;

    function updateCoins() {
      document.getElementById("coins").textContent = "Coins: " + coins;
    }

    function getRandomNumber() {
      return Math.floor(Math.random() * 9) + 1;
    }

    // SOUND EFFECTS (simple beep sounds)
    function playBeep(freq, duration) {
      const ctx = new (window.AudioContext || window.webkitAudioContext)();
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();

      osc.connect(gain);
      gain.connect(ctx.destination);

      osc.frequency.value = freq;
      osc.type = "square";

      osc.start();

      gain.gain.exponentialRampToValueAtTime(
        0.0001, ctx.currentTime + duration / 1000
      );

      setTimeout(() => ctx.close(), duration);
    }

    function spin() {
      if (coins < 10) {
        document.getElementById("result").textContent = "Out of coins!";
        return;
      }

      coins -= 10;
      updateCoins();

      const slots = [
        document.getElementById("slot1"),
        document.getElementById("slot2"),
        document.getElementById("slot3")
      ];

      // Start animation
      slots.forEach(s => s.classList.add("spinning"));

      // Spin sound
      playBeep(200, 200);

      setTimeout(() => {
        const n1 = getRandomNumber();
        const n2 = getRandomNumber();
        const n3 = getRandomNumber();

        slots[0].textContent = n1;
        slots[1].textContent = n2;
        slots[2].textContent = n3;

        slots.forEach(s => s.classList.remove("spinning"));

        const result = document.getElementById("result");

        // WIN LOGIC
        if (n1 === n2 && n2 === n3) {
          coins += 100;
          result.textContent = "🎉 JACKPOT!!! +100 coins!";
          result.style.color = "gold";
          playBeep(800, 300);
        } 
        else if (n1 === n2 || n2 === n3 || n1 === n3) {
          coins += 20;
          result.textContent = "✨ Nice! 2 match! +20 coins!";
          result.style.color = "lightgreen";
          playBeep(500, 200);
        } 
        else {
          result.textContent = "Try Again!";
          result.style.color = "white";
        }

        updateCoins();

      }, 1000);
    }
  </script>

</body>
